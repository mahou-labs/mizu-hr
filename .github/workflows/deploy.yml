name: Deploy Production

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to deploy (e.g., v1.2.3)"
        required: true
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      docs: ${{ steps.filter.outputs.docs }}
      site: ${{ steps.filter.outputs.site }}
      api: ${{ steps.filter.outputs.api }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}
          fetch-depth: 0

      - name: Get previous release tag
        id: prev_tag
        run: |
          CURRENT_TAG="${{ github.event.release.tag_name || inputs.tag }}"
          PREV_TAG=$(git describe --tags --abbrev=0 "$CURRENT_TAG^" 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found, will deploy all apps"
            echo "prev_tag=" >> $GITHUB_OUTPUT
          else
            echo "Previous tag: $PREV_TAG"
            echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT
          fi

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ steps.prev_tag.outputs.prev_tag || github.event.release.tag_name || inputs.tag }}
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/ui/**'
              - 'bun.lock'
            docs:
              - 'apps/docs/**'
              - 'bun.lock'
            site:
              - 'apps/site/**'
              - 'bun.lock'
            api:
              - 'apps/api/**'
              - 'bun.lock'

  deploy-web:
    name: Deploy Web (Production)
    runs-on: ubuntu-latest
    needs: [ci, changes]
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.web == ''
    environment:
      name: production
      url: ${{ vars.WEB_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web app
        run: bun run build
        working-directory: apps/web

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: deploy

  deploy-docs:
    name: Deploy Docs (Production)
    runs-on: ubuntu-latest
    needs: [ci, changes]
    if: needs.changes.outputs.docs == 'true' || needs.changes.outputs.docs == ''
    environment:
      name: production
      url: ${{ vars.DOCS_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build docs
        run: bun run build
        working-directory: apps/docs

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/docs
          command: deploy

  deploy-site:
    name: Deploy Site (Production)
    runs-on: ubuntu-latest
    needs: [ci, changes]
    if: needs.changes.outputs.site == 'true' || needs.changes.outputs.site == ''
    environment:
      name: production
      url: ${{ vars.SITE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build site
        run: bun run build
        working-directory: apps/site

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/site
          command: deploy

  deploy-api:
    name: Deploy API (Production)
    runs-on: ubuntu-latest
    needs: [ci, changes]
    if: needs.changes.outputs.api == 'true' || needs.changes.outputs.api == ''
    environment:
      name: production
      url: ${{ vars.API_URL }}
    env:
      DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
      DOKPLOY_API_TOKEN: ${{ secrets.DOKPLOY_API_TOKEN }}
      DOKPLOY_APPLICATION_ID: ${{ secrets.DOKPLOY_API_APPLICATION_ID }}
    steps:
      - name: Validate inputs
        run: |
          if [ -z "$DOKPLOY_URL" ]; then
            echo "::error::DOKPLOY_URL secret is not set"
            exit 1
          fi
          if [ -z "$DOKPLOY_API_TOKEN" ]; then
            echo "::error::DOKPLOY_API_TOKEN secret is not set"
            exit 1
          fi
          if [ -z "$DOKPLOY_APPLICATION_ID" ]; then
            echo "::error::DOKPLOY_API_APPLICATION_ID secret is not set"
            exit 1
          fi

      - name: Trigger Dokploy deployment
        run: |
          echo "Triggering production deployment for application: $DOKPLOY_APPLICATION_ID"
          echo "Release tag: ${{ github.event.release.tag_name || inputs.tag }}"

          response=$(curl -X POST \
            "$DOKPLOY_URL/api/application.deploy" \
            -H "Accept: application/json" \
            -H "x-api-key: $DOKPLOY_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"applicationId\": \"$DOKPLOY_APPLICATION_ID\"}" \
            -w "\n%{http_code}" \
            -s)

          http_code=$(echo "$response" | tail -n 1)
          body=$(echo "$response" | sed '$d')

          echo "Response body: $body"
          echo "HTTP status: $http_code"

          if [ "$http_code" -ne 200 ]; then
            echo "::error::Deployment failed with status code: $http_code"
            exit 1
          fi

          echo "::notice::Production deployment triggered successfully"

      - name: Wait for deployment
        run: |
          echo "Waiting for deployment to complete..."
          sleep 30

      - name: Health check
        run: |
          API_URL="${{ vars.API_URL }}"
          if [ -n "$API_URL" ]; then
            echo "Checking API health at $API_URL/healthcheck"

            for i in {1..5}; do
              response=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL/healthcheck" || echo "000")

              if [ "$response" = "200" ]; then
                echo "::notice::Health check passed"
                exit 0
              fi

              echo "Attempt $i: Health check returned $response, retrying in 10s..."
              sleep 10
            done

            echo "::warning::Health check failed after 5 attempts"
          else
            echo "::notice::Skipping health check - API_URL not configured"
          fi
