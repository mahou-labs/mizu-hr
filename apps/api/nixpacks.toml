[variables]
PORT = "3000"
BUN_VERSION = "1.3.0"
NIXPACKS_BUN_VERSION = "1.3.0"

[phases.setup]
nixPkgs = ["bun"]

[phases.install]
cmds = ["bun install --frozen-lockfile"]

[phases.build]
cmds = ["bun run build"]

[start]
cmd = "bunx --bun drizzle-kit push --force && ./server"

[healthcheck]
path = "/healthcheck"
interval = "10s"
timeout = "3s"
retries = 3
