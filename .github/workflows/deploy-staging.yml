name: Deploy Staging

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-staging-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  changes:
    name: Detect Changes
    runs-on: blacksmith-2vcpu-ubuntu-2404-arm
    outputs:
      web: ${{ steps.filter.outputs.web }}
      docs: ${{ steps.filter.outputs.docs }}
      site: ${{ steps.filter.outputs.site }}
      api: ${{ steps.filter.outputs.api }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/ui/**'
              - 'bun.lock'
            docs:
              - 'apps/docs/**'
              - 'bun.lock'
            site:
              - 'apps/site/**'
              - 'bun.lock'
            api:
              - 'apps/api/**'
              - 'bun.lock'

  deploy-app:
    name: Deploy App (Staging)
    runs-on: blacksmith-4vcpu-ubuntu-2404-arm
    needs: [ci, changes]
    if: needs.changes.outputs.web == 'true'
    environment:
      name: staging
      url: ${{ vars.APP_STAGING_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web app
        run: bun run build
        working-directory: apps/web

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: deploy --env staging

  deploy-api:
    name: Deploy API (Staging)
    runs-on: blacksmith-4vcpu-ubuntu-2404-arm
    needs: [ci, changes]
    if: needs.changes.outputs.api == 'true'
    environment:
      name: staging
      url: ${{ vars.API_STAGING_URL }}
    env:
      DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
      DOKPLOY_API_TOKEN: ${{ secrets.DOKPLOY_API_TOKEN }}
      DOKPLOY_APPLICATION_ID: ${{ secrets.DOKPLOY_API_APPLICATION_ID_STAGING }}
    steps:
      - name: Validate inputs
        run: |
          if [ -z "$DOKPLOY_URL" ]; then
            echo "::error::DOKPLOY_URL secret is not set"
            exit 1
          fi
          if [ -z "$DOKPLOY_API_TOKEN" ]; then
            echo "::error::DOKPLOY_API_TOKEN secret is not set"
            exit 1
          fi
          if [ -z "$DOKPLOY_APPLICATION_ID" ]; then
            echo "::error::DOKPLOY_API_APPLICATION_ID_STAGING secret is not set"
            exit 1
          fi

      - name: Trigger Dokploy deployment
        run: |
          echo "Triggering staging deployment for application: $DOKPLOY_APPLICATION_ID"

          response=$(curl -X POST \
            "$DOKPLOY_URL/api/application.deploy" \
            -H "Accept: application/json" \
            -H "x-api-key: $DOKPLOY_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"applicationId\": \"$DOKPLOY_APPLICATION_ID\"}" \
            -w "\n%{http_code}" \
            -s)

          http_code=$(echo "$response" | tail -n 1)
          body=$(echo "$response" | sed '$d')

          echo "Response body: $body"
          echo "HTTP status: $http_code"

          if [ "$http_code" -ne 200 ]; then
            echo "::error::Deployment failed with status code: $http_code"
            exit 1
          fi

          echo "::notice::Staging deployment triggered successfully"

      - name: Wait for deployment
        run: |
          echo "Waiting for deployment to complete..."
          sleep 30

      - name: Health check
        run: |
          API_URL="${{ vars.API_STAGING_URL }}"
          if [ -n "$API_URL" ]; then
            echo "Checking API health at $API_URL/healthcheck"

            for i in {1..5}; do
              response=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL/healthcheck" || echo "000")

              if [ "$response" = "200" ]; then
                echo "::notice::Health check passed"
                exit 0
              fi

              echo "Attempt $i: Health check returned $response, retrying in 10s..."
              sleep 10
            done

            echo "::warning::Health check failed after 5 attempts"
          else
            echo "::notice::Skipping health check - API_STAGING_URL not configured"
          fi
