[variables]
PORT = "3000"
BUN_VERSION = "1.3.0"

[phases.setup]
nixPkgs = ["curl", "unzip"]
cmds = ["curl -fsSL https://bun.sh/install | bash -s -- bun-v${BUN_VERSION}"]

[phases.install]
cmds = ["bun install --frozen-lockfile"]

[phases.build]
cmds = ["bun run build"]

[start]
cmd = "bunx --bun drizzle-kit push --force && ./server"

[healthcheck]
path = "/healthcheck"
interval = "10s"
timeout = "3s"
retries = 3
